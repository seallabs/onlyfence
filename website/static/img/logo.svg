<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 9 8" shape-rendering="crispEdges" width="72" height="64">
  <!-- OnlyFence Logo - Design B - Blue Octopus -->
  <!-- Row 0: top of head -->
  <rect x="2" y="0" width="5" height="1" fill="#60a5fa"/>
  <!-- Row 1: head fill -->
  <rect x="1" y="1" width="7" height="1" fill="#3b82f6"/>
  <!-- Row 2: eyes -->
  <rect x="1" y="2" width="1" height="1" fill="#3b82f6"/>
  <rect x="2" y="2" width="1" height="1" fill="#e0f2fe"/>
  <rect x="3" y="2" width="1" height="1" fill="#3b82f6"/>
  <rect x="4" y="2" width="1" height="1" fill="#2563eb"/>
  <rect x="5" y="2" width="1" height="1" fill="#3b82f6"/>
  <rect x="6" y="2" width="1" height="1" fill="#e0f2fe"/>
  <rect x="7" y="2" width="1" height="1" fill="#3b82f6"/>
  <!-- Row 3: lower head -->
  <rect x="1" y="3" width="7" height="1" fill="#3b82f6"/>
  <!-- Row 4: body band -->
  <rect x="1" y="4" width="7" height="1" fill="#2563eb"/>
  <!-- Row 5: upper tentacles -->
  <rect x="0" y="5" width="1" height="1" fill="#3b82f6"/>
  <rect x="2" y="5" width="2" height="1" fill="#3b82f6"/>
  <rect x="5" y="5" width="2" height="1" fill="#3b82f6"/>
  <rect x="8" y="5" width="1" height="1" fill="#3b82f6"/>
  <!-- Row 6: mid tentacles -->
  <rect x="0" y="6" width="1" height="1" fill="#2563eb"/>
  <rect x="2" y="6" width="1" height="1" fill="#2563eb"/>
  <rect x="4" y="6" width="1" height="1" fill="#3b82f6"/>
  <rect x="6" y="6" width="1" height="1" fill="#2563eb"/>
  <rect x="8" y="6" width="1" height="1" fill="#2563eb"/>
  <!-- Row 7: tentacle tips -->
  <rect x="0" y="7" width="1" height="1" fill="#60a5fa"/>
  <rect x="2" y="7" width="1" height="1" fill="#60a5fa"/>
  <rect x="4" y="7" width="1" height="1" fill="#60a5fa"/>
  <rect x="6" y="7" width="1" height="1" fill="#60a5fa"/>
  <rect x="8" y="7" width="1" height="1" fill="#60a5fa"/>
</svg>

name: Release

on:
  push:
    tags: ["[0-9]*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target_os: linux
            target_arch: x64
          - os: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64
          - os: macos-15-intel
            target_os: darwin
            target_arch: x64
          - os: macos-latest
            target_os: darwin
            target_arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - run: npm ci

      - name: Build standalone tarball
        run: |
          ./scripts/package-standalone.sh "${GITHUB_REF_NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: onlyfence-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist-standalone/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Smoke test install.sh
        run: |
          mkdir -p /tmp/release-artifacts
          cp artifacts/*.tar.gz /tmp/release-artifacts/

          INSTALL_DIR=$(mktemp -d)

          ONLYFENCE_BASE_URL="file:///tmp/release-artifacts" \
          ONLYFENCE_VERSION="${GITHUB_REF_NAME}" \
          ONLYFENCE_INSTALL_DIR="$INSTALL_DIR" \
          ONLYFENCE_SKIP_PATH_SETUP=1 \
          ONLYFENCE_SKIP_SETUP=1 \
          sh install.sh

          "${INSTALL_DIR}/bin/fence" --version

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums-sha256.txt
          body: |
            ## Install

            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            Or install a specific version:
            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | ONLYFENCE_VERSION=${{ github.ref_name }} sh
            ```

  docker:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

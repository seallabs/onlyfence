name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target_os: linux
            target_arch: x64
          - os: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64
          - os: macos-15-intel
            target_os: darwin
            target_arch: x64
          - os: macos-latest
            target_os: darwin
            target_arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build standalone tarball
        run: |
          chmod +x scripts/package-standalone.sh
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/package-standalone.sh "$VERSION"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onlyfence-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist-standalone/*.tar.gz

  test-install:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: "25"

      - name: Test install script with downloaded artifacts
        run: |
          # Stage tarballs to simulate a GitHub release
          mkdir -p /tmp/release-artifacts
          cp artifacts/*.tar.gz /tmp/release-artifacts/

          VERSION="${GITHUB_REF_NAME#v}"
          INSTALL_DIR=$(mktemp -d)

          # Run the real install.sh with local artifacts
          ONLYFENCE_BASE_URL="file:///tmp/release-artifacts" \
          ONLYFENCE_VERSION="$VERSION" \
          ONLYFENCE_INSTALL_DIR="$INSTALL_DIR" \
          ONLYFENCE_SKIP_PATH_SETUP=1 \
          sh install.sh

          # Verify the installation works
          FENCE_BIN="${INSTALL_DIR}/bin/fence"
          if [ -x "$FENCE_BIN" ]; then
            FENCE_VERSION=$("$FENCE_BIN" --version 2>/dev/null || echo "unknown")
            echo "SUCCESS: fence v${FENCE_VERSION}"
          else
            echo "FAIL: fence not found at ${FENCE_BIN}"
            exit 1
          fi

  publish:
    needs: test-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums-sha256.txt
          body: |
            ## Install

            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            Or install a specific version:
            ```sh
            ONLYFENCE_VERSION=${{ github.ref_name }} curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            Or via npm:
            ```sh
            npm install -g onlyfence@${{ github.ref_name }}
            ```

      - name: Publish to npm (stable releases only)
        if: "!contains(github.ref_name, '-')"
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Skip npm publish for pre-release
        if: "contains(github.ref_name, '-')"
        run: |
          echo "Pre-release version detected (${{ github.ref_name }}). Skipping npm publish."
          echo "GitHub Release created successfully. Team members can install via:"
          echo "  ONLYFENCE_VERSION=${{ github.ref_name }} curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh"
